name: Deploy to GitHub Pages

on:
  push:
    branches:
      - feature
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git worktree remove /tmp/gh-pages-deploy --force 2>/dev/null || true
          rm -rf /tmp/gh-pages-deploy

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages-deploy origin/gh-pages

          cp -r Front/. /tmp/gh-pages-deploy/

          cd /tmp/gh-pages-deploy
          git add -A
          git diff --cached --quiet || git commit -m "Deploy from ${{ github.ref_name }} @ ${{ github.sha }}"
          git push origin HEAD:gh-pages

          cd ${{ github.workspace }}
          git worktree remove /tmp/gh-pages-deploy --force
